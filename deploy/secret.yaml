apiVersion: v1
kind: Secret
metadata:
  name: opnsense-credentials
  namespace: opnsense-operator
type: Opaque
stringData:
  OPNSENSE_HOST: "192.168.1.1"       # replace with your OPNsense host/IP
  OPNSENSE_API_KEY: ""               # replace with your API key
  OPNSENSE_API_SECRET: ""            # replace with your API secret
  OPNSENSE_VERIFY_SSL: "false"       # set to "true" if using a trusted cert
